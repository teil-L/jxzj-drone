<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031225"/>
      <stop offset="60%" stop-color="#071a30"/>
      <stop offset="100%" stop-color="#0a223b"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0.3" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#0aa9d2" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#17c9e8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0aa9d2" stop-opacity="0.55"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1cc7e0" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect width="1400" height="700" fill="url(#grid)"/>

  <g opacity="0.45" stroke="#3aa9c5" stroke-width="2">
    <path d="M140 90 L360 150 L550 120 L740 180 L920 160 L1120 230 L1290 210" fill="none"/>
    <path d="M70 470 L260 420 L430 450 L610 410 L840 430 L1020 390 L1260 430" fill="none"/>
    <path d="M200 280 L280 360 L390 330 L480 370 L570 340 L660 390" fill="none"/>
  </g>

  <path d="M-30 430 C220 290 450 520 700 370 C910 245 1140 450 1430 300 L1430 520 L-30 520 Z"
        fill="url(#river)"/>
  <path d="M-30 420 C220 280 450 510 700 360 C910 235 1140 440 1430 290"
        fill="none" stroke="#6beeff" stroke-opacity="0.45" stroke-width="5" filter="url(#glow)"/>

  <g font-family="Microsoft YaHei, Arial, sans-serif" font-size="21" fill="#8defff" opacity="0.95">
    <text x="510" y="310">武汉长江</text>
  </g>

  <g font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#66dff2" opacity="0.9">
    <text x="260" y="250">汉口江滩</text>
    <text x="830" y="260">武汉长江二桥</text>
    <text x="1060" y="215">青山江段</text>
  </g>

  <g fill="#80f7ff" opacity="0.8">
    <circle cx="300" cy="338" r="4"/>
    <circle cx="630" cy="378" r="4"/>
    <circle cx="860" cy="333" r="4"/>
  </g>
</svg>
